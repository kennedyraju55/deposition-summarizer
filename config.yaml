# Deposition Summarizer Configuration

app:
  name: "Deposition Summarizer"
  version: "1.0.0"

llm:
  model: "gemma4:latest"
  temperature: 0.3
  max_tokens: 4096
  ollama_host: "http://localhost:11434"

analysis:
  highlight_threshold: "medium"
  max_transcript_length: 50000

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
