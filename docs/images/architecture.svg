<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#d4a843" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="bold">System Architecture</text>

  <!-- User Layer -->
  <rect x="50" y="60" width="140" height="50" rx="8" fill="#2d3a4a" stroke="#d4a843" stroke-width="2"/>
  <text x="120" y="90" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13">📋 CLI</text>

  <rect x="220" y="60" width="140" height="50" rx="8" fill="#2d3a4a" stroke="#d4a843" stroke-width="2"/>
  <text x="290" y="90" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13">🌐 Web UI</text>

  <rect x="390" y="60" width="140" height="50" rx="8" fill="#2d3a4a" stroke="#d4a843" stroke-width="2"/>
  <text x="460" y="90" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13">🔌 REST API</text>

  <text x="650" y="90" text-anchor="middle" fill="#888" font-family="Segoe UI,Arial,sans-serif" font-size="12">User Interfaces</text>

  <!-- Arrows down -->
  <line x1="120" y1="110" x2="400" y2="155" stroke="#555" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="290" y1="110" x2="400" y2="155" stroke="#555" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="460" y1="110" x2="400" y2="155" stroke="#555" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Core Engine -->
  <rect x="250" y="150" width="300" height="60" rx="10" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" fill="#4fc3f7" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">⚙️ Deposition Summarizer Core</text>
  <text x="400" y="198" text-anchor="middle" fill="#aaa" font-family="Segoe UI,Arial,sans-serif" font-size="11">summarize • admissions • contradictions • testimony</text>

  <!-- Arrow down -->
  <line x1="400" y1="210" x2="400" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- LLM Client -->
  <rect x="280" y="240" width="240" height="50" rx="8" fill="#2d3a4a" stroke="#81c784" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" fill="#81c784" font-family="Segoe UI,Arial,sans-serif" font-size="13">🔗 common/llm_client.py</text>

  <!-- Arrow down -->
  <line x1="400" y1="290" x2="400" y2="320" stroke="#555" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Ollama -->
  <rect x="280" y="320" width="240" height="55" rx="8" fill="#1b5e20" stroke="#66bb6a" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🦙 Ollama (Local)</text>
  <text x="400" y="365" text-anchor="middle" fill="#a5d6a7" font-family="Segoe UI,Arial,sans-serif" font-size="11">Gemma 4 • localhost:11434</text>

  <!-- Privacy badge -->
  <rect x="590" y="320" width="170" height="55" rx="8" fill="#b71c1c" stroke="#ef5350" stroke-width="1"/>
  <text x="675" y="345" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🔒 100% LOCAL</text>
  <text x="675" y="363" text-anchor="middle" fill="#ffcdd2" font-family="Segoe UI,Arial,sans-serif" font-size="10">Zero Data Leakage</text>
</svg>
